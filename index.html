<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>潘俊侪 · 海报素材集</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --blue:#0066cc;--white:#fff;--muted:#86868b;
  --r-pill:9999px;--r-lg:18px;
}
body{
  font-family:var(--font);background:#000;color:var(--white);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

/* ============================================================
   [MENU-BLOCK-REVEAL] 开场 — 方块随机出现 → 消失 → 露出主页
   ============================================================ */
.block-reveal{
  position:fixed;inset:0;z-index:1000;pointer-events:none;
  display:flex;flex-wrap:wrap;align-content:flex-start;
}
.block-reveal .block{
  width:80px;height:80px;opacity:0;
  background:var(--blue);
}
.block-reveal.done{display:none}

/* ============================================================
   HERO SECTION — visible after block reveal
   ============================================================ */
.hero{
  position:relative;width:100%;height:100vh;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:#000;text-align:center;padding:2rem;z-index:1;
}
.hero h1{
  font-size:clamp(2.5rem,8vw,6rem);font-weight:600;
  letter-spacing:-0.03em;line-height:1;color:var(--white);
  opacity:0;transform:translateY(30px);
}
.hero .sub{
  font-size:clamp(1rem,2.5vw,1.5rem);font-weight:300;color:var(--muted);
  margin-top:1.5rem;opacity:0;transform:translateY(20px);
}
.scroll-indicator{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  opacity:0;display:flex;flex-direction:column;align-items:center;gap:8px;
}
.scroll-indicator span{
  font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
}
.scroll-indicator .line{
  width:1px;height:40px;background:linear-gradient(180deg,var(--muted),transparent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.3)}}

/* ============================================================
   [KAITONOTE] 滚动驱动画廊 — 海报在滚动中散开
   ============================================================ */
.scroll-gallery{
  position:relative;height:500vh;z-index:1;
}
.scroll-gallery .pin-stage{
  position:sticky;top:0;height:100vh;overflow:hidden;
  perspective:2000px;transform-style:preserve-3d;
  background:var(--white);color:#000;
}
.scroll-gallery .pin-stage.dark{background:#111;color:#fff}
.scroll-gallery .scatter-img{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:clamp(200px,30vw,450px);height:clamp(280px,42vw,600px);
  object-fit:cover;will-change:transform;
  border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.scroll-gallery .center-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:2;pointer-events:none;
}
.scroll-gallery .center-text h2{
  font-size:clamp(1.5rem,4vw,3rem);font-weight:600;letter-spacing:-0.03em;
  max-width:600px;
}

/* ============================================================
   [PHANTOM] Three.js 无限网格画廊
   ============================================================ */
.phantom-section{position:relative;height:100vh;width:100%;overflow:hidden}
.phantom-section #gallery{position:absolute;inset:0}
.phantom-section canvas{display:block}

/* ============================================================
   OVERLAY UI — on top of Three.js
   ============================================================ */
.gallery-overlay{position:absolute;inset:0;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;justify-content:space-between;padding:24px 28px}
.gallery-overlay>*{pointer-events:auto}

.gallery-top{display:flex;justify-content:space-between;align-items:flex-start}
.gallery-title{font-size:21px;font-weight:600;letter-spacing:0.231px;color:var(--white);
  text-shadow:0 0 20px rgba(0,0,0,.5)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.filter-chip{
  font-family:var(--font);font-size:13px;font-weight:400;
  color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);border-radius:var(--r-pill);
  padding:7px 16px;cursor:pointer;backdrop-filter:blur(10px);
  transition:all .25s;
}
.filter-chip:hover,.filter-chip.active{background:var(--blue);border-color:var(--blue);color:#fff}

.gallery-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.creator-pill{display:flex;align-items:center;gap:12px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(20px);
  border-radius:var(--r-pill);padding:8px 18px 8px 8px;
  border:1px solid rgba(255,255,255,.08)}
.creator-pill .av{width:36px;height:36px;border-radius:50%;overflow:hidden}
.creator-pill .av img{width:100%;height:100%;object-fit:cover}
.creator-pill .nm{font-size:14px;font-weight:500;color:#fff}
.creator-pill .lb{font-size:11px;color:var(--muted)}
.hint{font-size:12px;color:rgba(255,255,255,.4);text-align:right}

/* ============================================================
   TOOLTIP
   ============================================================ */
.tt{
  position:fixed;z-index:30;pointer-events:none;
  font-family:var(--mono);font-size:12px;color:#fff;
  background:rgba(0,0,0,.75);backdrop-filter:blur(10px);
  border-radius:8px;padding:8px 14px;opacity:0;
  transform:translate(-50%,-120%);transition:opacity .15s;
}
.tt.show{opacity:1}

/* ============================================================
   [SVG-STROKE] Lightbox — SVG 描边过渡
   ============================================================ */
.lb-overlay{position:fixed;inset:0;z-index:200;pointer-events:none}
.lb-overlay svg{width:100%;height:100%;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(1.5)}
.lb-overlay path{stroke-dasharray:99999;stroke-dashoffset:99999}
.lb-bg{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.95);
  opacity:0;pointer-events:none;transition:opacity .3s}
.lb-bg.open{opacity:1;pointer-events:auto}
.lb-content{position:fixed;inset:0;z-index:195;display:flex;
  align-items:center;justify-content:center;opacity:0;pointer-events:none}
.lb-content.open{opacity:1;pointer-events:auto}
.lb-content img{max-width:88vw;max-height:88vh;border-radius:var(--r-lg);
  box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-close{position:absolute;top:24px;right:24px;width:44px;height:44px;
  border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;
  font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:14px;color:var(--muted)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%)}
.lb-nav.l{left:20px}.lb-nav.r{right:20px}

/* ============================================================
   LOADING
   ============================================================ */
.loading{position:fixed;inset:0;z-index:3000;display:flex;
  align-items:center;justify-content:center;background:#000;transition:opacity .5s}
.loading.done{opacity:0;pointer-events:none}
.loading span{font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:.5em}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:640px){
  .block-reveal .block{width:50px;height:50px}
  .gallery-overlay{padding:16px}
  .gallery-title{font-size:16px}
  .filter-chip{font-size:11px;padding:5px 12px}
  .creator-pill{padding:6px 14px 6px 6px}
  .creator-pill .av{width:28px;height:28px}
  .hint{display:none}
  .scroll-gallery .scatter-img{width:180px;height:260px}
}
</style>
</head>
<body>

<!-- ============================================================
     [MENU-BLOCK-REVEAL] 开场方块
     ============================================================ -->
<div class="block-reveal" id="blockReveal"></div>

<!-- ============================================================
     LOADING
     ============================================================ -->
<div class="loading" id="loading"><span>Loading</span></div>

<!-- ============================================================
     HERO (revealed after blocks)
     ============================================================ -->
<section class="hero" id="hero">
  <h1 id="heroTitle">海报素材收集库</h1>
  <p class="sub" id="heroSub">潘俊侪 · 32 张精选海报</p>
  <div class="scroll-indicator" id="scrollInd">
    <span>Scroll</span><div class="line"></div>
  </div>
</section>

<!-- ============================================================
     [KAITONOTE] 滚动散开画廊
     ============================================================ -->
<section class="scroll-gallery" id="scrollGallery">
  <div class="pin-stage dark" id="pinStage1">
    <div class="center-text"><h2>拖拽或滚动<br>浏览素材</h2></div>
    <div id="scatterContainer"></div>
  </div>
  <div class="pin-stage" id="pinStage2">
    <div class="center-text"><h2>每张海报<br>都值得细看</h2></div>
  </div>
</section>

<!-- ============================================================
     [PHANTOM] Three.js 无限网格
     ============================================================ -->
<section class="phantom-section" id="phantomSection">
  <div id="gallery"></div>
  <div class="gallery-overlay">
    <div class="gallery-top">
      <span class="gallery-title">全部素材</span>
    </div>
    <div class="filter-row" id="filters">
      <button class="filter-chip active" data-filter="all">全部</button>
      <button class="filter-chip" data-filter="a">系列 A</button>
      <button class="filter-chip" data-filter="b">系列 B</button>
      <button class="filter-chip" data-filter="c">系列 C</button>
      <button class="filter-chip" data-filter="d">系列 D</button>
    </div>
    <div class="gallery-bottom">
      <div class="creator-pill">
        <div class="av"><img src="网站制作者.jpg" alt="潘俊侪"></div>
        <div><div class="nm">潘俊侪</div><div class="lb">Collection Curator</div></div>
      </div>
      <span class="hint">拖拽平移 · 滚轮缩放 · 点击查看大图</span>
    </div>
  </div>
</section>

<!-- ============================================================
     TOOLTIP
     ============================================================ -->
<div class="tt" id="tt"></div>

<!-- ============================================================
     [SVG-STROKE] Lightbox
     ============================================================ -->
<div class="lb-overlay" id="lbOverlay">
  <svg id="lbSvg" viewBox="0 0 2453 2535" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path id="lbPath1" d="M227.549 1818.76C227.549 1818.76 406.016 2207.75 569.049 2130.26C843.431 1999.85 -264.104 1002.3 227.549 876.262C552.918 792.849 773.647 2456.11 1342.05 2130.26C1885.43 1818.76 14.9644 455.772 760.548 137.262C1342.05 -111.152 1663.5 2266.35 2209.55 1972.76C2755.6 1679.18 1536.63 384.467 1826.55 137.262C2013.5 -22.1463 2209.55 381.262 2209.55 381.262" stroke="var(--blue)" stroke-width="200" stroke-linecap="round"/>
    <path id="lbPath2" d="M1661.28 2255.51C1661.28 2255.51 2311.09 1960.37 2111.78 1817.01C1944.47 1696.67 718.456 2870.17 499.781 2255.51C308.969 1719.17 2457.51 1613.83 2111.78 963.512C1766.05 313.198 427.949 2195.17 132.281 1455.51C-155.219 736.292 2014.78 891.514 1708.78 252.012C1437.81 -314.29 369.471 909.169 132.281 566.512C18.1772 401.672 244.781 193.012 244.781 193.012" stroke="#6e44ff" stroke-width="200" stroke-linecap="round"/>
  </svg>
</div>
<div class="lb-bg" id="lbBg"></div>
<div class="lb-content" id="lbContent">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-close lb-nav l" id="lbPrev">‹</button>
  <button class="lb-close lb-nav r" id="lbNext">›</button>
  <img src="" alt="" id="lbImg">
  <span class="lb-info" id="lbInfo"></span>
</div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script type="importmap">
{ "imports": { "three": "https://esm.sh/three@0.184.0" } }
</script>
<script type="module">
import * as THREE from 'three';
gsap.registerPlugin(ScrollTrigger);

/* ================================================================
   POSTER DATA
   ================================================================ */
const TOTAL = 32;
const posters = [];
const cats = ['a','b','c','d'];
for (let i = 1; i <= TOTAL; i++) {
  posters.push({
    id:i, image:`${i}.jpg`, category:cats[Math.floor((i-1)/8)],
    label:`海报 ${String(i).padStart(2,'0')}`,
  });
}
let visiblePosters = posters.slice();
let activeFilter = 'all';

/* ================================================================
   [1] MENU-BLOCK-REVEAL 开场
   ================================================================ */
function initBlockReveal() {
  const container = document.getElementById('blockReveal');
  const w = innerWidth, h = innerHeight;
  const size = Math.min(w, h) < 640 ? 50 : 80;
  const cols = Math.ceil(w / size), rows = Math.ceil(h / size);
  container.style.width = cols * size + 'px';
  container.style.height = rows * size + 'px';

  const blocks = [];
  for (let i = 0; i < cols * rows; i++) {
    const b = document.createElement('div');
    b.className = 'block';
    b.style.width = b.style.height = size + 'px';
    // Color palette: blue tones from the design system
    const colors = ['#0066cc','#0071e3','#2997ff','#1d1d1f','#272729','#476cff'];
    b.style.background = colors[Math.floor(Math.random() * colors.length)];
    container.appendChild(b);
    blocks.push(b);
  }

  const tl = gsap.timeline({ onComplete: () => container.classList.add('done') });

  // Appear randomly
  tl.fromTo(blocks, { opacity: 0 }, {
    opacity: 1, duration: .03, stagger: { each: .002, from: 'random' },
  });
  // Hold
  tl.to({}, { duration: .6 });
  // Disappear randomly
  tl.to(blocks, {
    opacity: 0, duration: .03, stagger: { each: .002, from: 'random' },
  });

  // Reveal hero text after blocks fade
  tl.fromTo('#heroTitle', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: .8, ease: 'power3.out' }, '-=0.3');
  tl.fromTo('#heroSub', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: .6, ease: 'power2.out' }, '-=0.4');
  tl.fromTo('#scrollInd', { opacity: 0 }, { opacity: 1, duration: .5 }, '-=0.2');
}
initBlockReveal();

/* ================================================================
   [2] KAITONOTE 滚动散开画廊
   ================================================================ */
function initScatterGallery() {
  const container = document.getElementById('scatterContainer');
  const stage = document.getElementById('pinStage1');
  const count = 12; // featured posters for scatter

  // Directions for scattering
  const dirs = [
    {x:1.3,y:.7},{x:-1.5,y:1},{x:1.1,y:-1.3},{x:-1.7,y:-.8},
    {x:.8,y:1.5},{x:-1,y:-1.4},{x:1.6,y:.3},{x:-.7,y:1.7},
    {x:1.2,y:-1.6},{x:-1.4,y:.9},{x:1.8,y:-.5},{x:-1.1,y:-1.8},
  ];

  const imgs = [];
  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.className = 'scatter-img';
    img.src = posters[i].image;
    img.alt = posters[i].label;
    img.loading = 'lazy';
    container.appendChild(img);
    imgs.push(img);

    // Start: invisible at center
    gsap.set(img, { opacity: 0, scale: .5, x: 0, y: 0, z: -500, rotationY: 0 });
  }

  ScrollTrigger.create({
    trigger: '#scrollGallery',
    start: 'top top',
    end: 'bottom bottom',
    scrub: 1.2,
    onUpdate: (self) => {
      const p = self.progress;
      const vw = innerWidth, vh = innerHeight;
      const isMobile = vw < 640;

      imgs.forEach((img, i) => {
        const delay = i * .03;
        const ip = Math.max(0, (p - delay) * 3);
        const d = dirs[i];
        const mult = isMobile ? 3 : .6;

        gsap.set(img, {
          opacity: gsap.utils.interpolate(0, 1, Math.min(1, ip * 2)),
          scale: gsap.utils.interpolate(.5, 1, ip),
          x: gsap.utils.interpolate(0, d.x * vw * mult, ip),
          y: gsap.utils.interpolate(0, d.y * vh * mult, ip),
          z: gsap.utils.interpolate(-500, 1500, ip),
          rotationY: gsap.utils.interpolate(0, (i % 2 ? 30 : -30), ip),
        });
      });
    },
  });
}
initScatterGallery();

/* ================================================================
   [3] PHANTOM Three.js 无限网格
   ================================================================ */
const galleryContainer = document.getElementById('gallery');
const scene3 = new THREE.Scene();
const camera3 = new THREE.OrthographicCamera(-1, 1, 1, -1, .1, 10);
camera3.position.z = 1;

const renderer3 = new THREE.WebGLRenderer({ antialias: true });
renderer3.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer3.setClearColor(0x000000, 1);
galleryContainer.appendChild(renderer3.domElement);

/* Shaders */
const vShader = `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;
const fShader = `
uniform vec2 uOffset,uResolution,uMousePos;
uniform float uZoom,uCellSize,uTextureCount,uAtlasSize;
uniform sampler2D uImageAtlas;
varying vec2 vUv;
void main(){
  vec2 suv=(vUv-.5)*2.;
  float r=length(suv);
  float d=1.-.08*r*r;
  vec2 wc=suv*d*vec2(uResolution.x/uResolution.y,1.)*uZoom+uOffset;
  vec2 ci=floor(wc/uCellSize);
  vec2 cu=fract(wc/uCellSize);

  vec2 ms=uMousePos/uResolution*2.-1.;ms.y=-ms.y;
  float mr=length(ms);
  vec2 mw=ms*(1.-.08*mr*mr)*vec2(uResolution.x/uResolution.y,1.)*uZoom+uOffset;
  vec2 mci=floor(mw/uCellSize);
  float h=1.-smoothstep(.4,.7,length((ci+.5)-(mci+.5)));
  bool hov=h>0.&&uMousePos.x>=0.;

  float lw=.004;
  float gm=smoothstep(0.,lw,cu.x)*smoothstep(0.,lw,1.-cu.x)*smoothstep(0.,lw,cu.y)*smoothstep(0.,lw,1.-cu.y);

  float isz=.62,ib=(1.-isz)*.5;
  vec2 iuv=(cu-ib)/isz;
  float es=.008;
  float ia=smoothstep(-es,es,iuv.x)*smoothstep(-es,es,1.-iuv.x)*smoothstep(-es,es,iuv.y)*smoothstep(-es,es,1.-iuv.y);
  bool inI=iuv.x>=0.&&iuv.x<=1.&&iuv.y>=0.&&iuv.y<=1.;

  float ti=mod(ci.x+ci.y*3.,uTextureCount);
  if(ti<0.)ti+=uTextureCount;
  vec2 ap=vec2(mod(ti,uAtlasSize),floor(ti/uAtlasSize));

  vec3 bg=vec3(.04);if(hov)bg=mix(bg,vec3(.12),h);
  vec3 col=bg;
  if(inI&&ia>0.){vec3 ic=texture2D(uImageAtlas,(ap+iuv)/uAtlasSize).rgb;col=mix(col,ic,ia);}
  col=mix(col,vec3(.15),(1.-gm)*.3);
  col*=1.-smoothstep(1.2,1.8,r);
  gl_FragColor=vec4(col,1.);
}`;

let plane3, uniforms3;
let offset = {x:0,y:0}, targetOffset = {x:0,y:0};
let zoom = 1., targetZoom = 1.;
let mouse = {x:-1,y:-1};
let dragging = false, isClick = true, clickTime = 0;
let prevM = {x:0,y:0};
const LERP = .075;

function resize3(){
  const w = galleryContainer.clientWidth, h = galleryContainer.clientHeight;
  renderer3.setSize(w, h);
  if (uniforms3) uniforms3.uResolution.value.set(w, h);
}
window.addEventListener('resize', resize3);

/* Image loading */
function makePlaceholder(text) {
  const c = document.createElement('canvas'); c.width = 400; c.height = 560;
  const cx = c.getContext('2d');
  cx.fillStyle = '#1a1a1e'; cx.fillRect(0, 0, c.width, c.height);
  cx.fillStyle = '#444'; cx.font = '16px Inter,sans-serif'; cx.textAlign = 'center';
  cx.fillText(text, c.width/2, c.height/2);
  return c;
}
async function loadImg(src, fb) {
  try {
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => i.naturalWidth > 0 ? res(i) : rej(new Error('zero'));
      i.onerror = () => rej(new Error('fail'));
      i.src = src;
    });
    return img;
  } catch(e) { console.warn(`Load fail: ${src}`, e.message); return makePlaceholder(fb); }
}

async function buildAtlas(images) {
  const n = images.length, ats = Math.ceil(Math.sqrt(n)), cell = 400;
  const sz = Math.min(ats * cell, 4096), fc = Math.floor(sz / ats);
  const cv = document.createElement('canvas'); cv.width = cv.height = sz;
  const cx = cv.getContext('2d');
  cx.fillStyle = '#0a0a0a'; cx.fillRect(0, 0, sz, sz);
  for (let i = 0; i < n; i++) {
    const img = images[i];
    const x = (i % ats) * fc, y = Math.floor(i / ats) * fc;
    const pad = 16, dw = fc - pad*2, dh = fc - pad*2;
    const sw = img.naturalWidth || img.width || 400;
    const sh = img.naturalHeight || img.height || 560;
    const sc = Math.min(dw/sw, dh/sh);
    if (sc > 0) cx.drawImage(img, x+(fc-sw*sc)/2, y+(fc-sh*sc)/2, sw*sc, sh*sc);
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.minFilter = tex.magFilter = THREE.LinearFilter;
  tex.colorSpace = THREE.SRGBColorSpace;
  return { tex, ats, fc };
}

async function initPhantomGallery(list) {
  if (plane3) { scene3.remove(plane3); plane3.geometry?.dispose(); plane3.material?.dispose(); }
  const imgs = await Promise.all(list.map(p => loadImg(p.image, p.label)));
  const atlas = await buildAtlas(imgs);
  uniforms3 = {
    uOffset:{value:new THREE.Vector2(0,0)},
    uResolution:{value:new THREE.Vector2(galleryContainer.clientWidth,galleryContainer.clientHeight)},
    uMousePos:{value:new THREE.Vector2(-1,-1)},
    uZoom:{value:1.},uCellSize:{value:.75},uTextureCount:{value:list.length},
    uAtlasSize:{value:atlas.ats},uImageAtlas:{value:atlas.tex},
  };
  const geo = new THREE.PlaneGeometry(2,2);
  const mat = new THREE.ShaderMaterial({vertexShader:vShader,fragmentShader:fShader,uniforms:uniforms3});
  plane3 = new THREE.Mesh(geo, mat);
  scene3.add(plane3);
}

/* Mouse / touch / wheel */
const el3 = renderer3.domElement;
el3.addEventListener('mousemove', e => {
  const r = el3.getBoundingClientRect();
  mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
  if (uniforms3) uniforms3.uMousePos.value.set(mouse.x, mouse.y);
  if (dragging) {
    const dx = e.clientX - prevM.x, dy = e.clientY - prevM.y;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) { isClick = false; if (targetZoom === 1) targetZoom = 1.25; }
    targetOffset.x -= dx * .003; targetOffset.y += dy * .003;
    prevM.x = e.clientX; prevM.y = e.clientY;
  }
  updateTT();
});
el3.addEventListener('mouseleave', () => { mouse.x = mouse.y = -1; if (uniforms3) uniforms3.uMousePos.value.set(-1,-1); hideTT(); });
el3.addEventListener('mousedown', e => { dragging = true; isClick = true; clickTime = Date.now(); prevM.x = e.clientX; prevM.y = e.clientY; });
window.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false; targetZoom = 1.;
  if (isClick && Date.now() - clickTime < 200) handleClick(e);
});
el3.addEventListener('wheel', e => { e.preventDefault(); targetZoom = Math.max(.5, Math.min(3, targetZoom - e.deltaY * .001)); }, {passive:false});
el3.addEventListener('touchstart', e => { e.preventDefault(); dragging = true; isClick = true; clickTime = Date.now(); prevM.x = e.touches[0].clientX; prevM.y = e.touches[0].clientY; }, {passive:false});
el3.addEventListener('touchmove', e => {
  e.preventDefault(); if (!dragging) return;
  const dx = e.touches[0].clientX - prevM.x, dy = e.touches[0].clientY - prevM.y;
  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) { isClick = false; if (targetZoom === 1) targetZoom = 1.25; }
  targetOffset.x -= dx * .003; targetOffset.y += dy * .003;
  prevM.x = e.touches[0].clientX; prevM.y = e.touches[0].clientY;
}, {passive:false});
el3.addEventListener('touchend', e => { if (!dragging) return; dragging = false; targetZoom = 1.; if (isClick && Date.now() - clickTime < 200) handleClick({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY}); });

function handleClick(e) {
  const r = el3.getBoundingClientRect();
  const sx = ((e.clientX - r.left) / r.width) * 2 - 1;
  const sy = -(((e.clientY - r.top) / r.height) * 2 - 1);
  const rad = Math.sqrt(sx*sx + sy*sy), dist = 1 - .08*rad*rad;
  const asp = galleryContainer.clientWidth / galleryContainer.clientHeight;
  let wx = sx * dist * asp * zoom + offset.x;
  let wy = sy * dist * zoom + offset.y;
  const cx = Math.floor(wx / .75), cy = Math.floor(wy / .75);
  let idx = Math.floor((cx + cy * 3) % visiblePosters.length);
  if (idx < 0) idx += visiblePosters.length;
  const poster = visiblePosters[idx];
  if (poster) openLB(poster.id);
}

/* Tooltip */
const tt = document.getElementById('tt');
let ttPoster = null;
function updateTT(){
  if (dragging) { hideTT(); return; }
  const r = el3.getBoundingClientRect();
  const sx = (mouse.x / r.width) * 2 - 1, sy = -(mouse.y / r.height) * 2 + 1;
  const rad = Math.sqrt(sx*sx+sy*sy), dist = 1 - .08*rad*rad;
  const asp = galleryContainer.clientWidth / galleryContainer.clientHeight;
  let wx = sx * dist * asp * zoom + offset.x, wy = sy * dist * zoom + offset.y;
  const cx = Math.floor(wx / .75), cy = Math.floor(wy / .75);
  let idx = Math.floor((cx + cy * 3) % visiblePosters.length);
  if (idx < 0) idx += visiblePosters.length;
  const poster = visiblePosters[idx];
  if (poster && poster !== ttPoster) { ttPoster = poster; tt.textContent = poster.label; tt.classList.add('show'); }
  if (poster) { tt.style.left = mouse.x + 'px'; tt.style.top = mouse.y + 'px'; }
}
function hideTT(){ ttPoster = null; tt.classList.remove('show'); }

/* [SVG-STROKE] Lightbox */
const lbBg = document.getElementById('lbBg'), lbContent = document.getElementById('lbContent');
const lbImg = document.getElementById('lbImg'), lbInfo = document.getElementById('lbInfo');
const lbPath1 = document.getElementById('lbPath1'), lbPath2 = document.getElementById('lbPath2');
let currentLb = 1, lbOpen = false;

function openLB(id) {
  if (lbOpen) return;
  currentLb = id; lbOpen = true;
  lbImg.src = `${id}.jpg`;
  lbInfo.textContent = `No.${String(id).padStart(2,'0')} / ${TOTAL}`;

  // SVG stroke reveal
  const len1 = lbPath1.getTotalLength(), len2 = lbPath2.getTotalLength();
  gsap.set([lbPath1, lbPath2], { strokeDasharray: l => l.getTotalLength(), strokeDashoffset: l => l.getTotalLength() });
  lbBg.classList.add('open');
  const tl = gsap.timeline({ onComplete: () => lbContent.classList.add('open') });
  tl.to(lbPath1, { strokeDashoffset: 0, attr: { 'stroke-width': 700 }, duration: .6, ease: 'power1.inOut' }, 0);
  tl.to(lbPath2, { strokeDashoffset: 0, attr: { 'stroke-width': 700 }, duration: .6, ease: 'power1.inOut' }, 0);
  // Then reverse to reveal
  tl.to(lbPath1, { strokeDashoffset: -len1, attr: { 'stroke-width': 200 }, duration: .5, ease: 'power1.inOut' });
  tl.to(lbPath2, { strokeDashoffset: -len2, attr: { 'stroke-width': 200 }, duration: .5, ease: 'power1.inOut' }, '-=0.4');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  lbOpen = false;
  const len1 = lbPath1.getTotalLength(), len2 = lbPath2.getTotalLength();
  gsap.set([lbPath1, lbPath2], { strokeDasharray: l => l.getTotalLength(), strokeDashoffset: 0 });
  const tl = gsap.timeline({ onComplete: () => { lbBg.classList.remove('open'); lbContent.classList.remove('open'); document.body.style.overflow = ''; } });
  tl.to(lbPath1, { strokeDashoffset: -len1, attr: { 'stroke-width': 700 }, duration: .5, ease: 'power1.inOut' }, 0);
  tl.to(lbPath2, { strokeDashoffset: -len2, attr: { 'stroke-width': 700 }, duration: .5, ease: 'power1.inOut' }, 0);
}
function lbNext() { const list = visiblePosters; const cur = list.findIndex(p => p.id === currentLb); openLB(list[(cur + 1) % list.length].id); }
function lbPrev() { const list = visiblePosters; const cur = list.findIndex(p => p.id === currentLb); openLB(list[(cur - 1 + list.length) % list.length].id); }

document.getElementById('lbClose').addEventListener('click', closeLB);
document.getElementById('lbPrev').addEventListener('click', lbPrev);
document.getElementById('lbNext').addEventListener('click', lbNext);
lbBg.addEventListener('click', e => { if (e.target === lbBg) closeLB(); });
document.addEventListener('keydown', e => {
  if (!lbOpen) return;
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'ArrowLeft') lbPrev();
});

/* Filter */
document.querySelectorAll('#filters .filter-chip').forEach(chip => {
  chip.addEventListener('click', async () => {
    document.querySelectorAll('#filters .filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    visiblePosters = activeFilter === 'all' ? posters.slice() : posters.filter(p => p.category === activeFilter);
    offset = {x:0,y:0}; targetOffset = {x:0,y:0}; zoom = 1.; targetZoom = 1.;
    await initPhantomGallery(visiblePosters);
  });
});

/* Animation loop */
function animate() {
  requestAnimationFrame(animate);
  offset.x += (targetOffset.x - offset.x) * LERP;
  offset.y += (targetOffset.y - offset.y) * LERP;
  zoom += (targetZoom - zoom) * LERP;
  if (plane3?.material.uniforms) {
    plane3.material.uniforms.uOffset.value.set(offset.x, offset.y);
    plane3.material.uniforms.uZoom.value = zoom;
  }
  renderer3.render(scene3, camera3);
}

/* Start */
async function start() {
  visiblePosters = posters.slice();
  await initPhantomGallery(visiblePosters);
  resize3();
  document.getElementById('loading').classList.add('done');
  setTimeout(() => document.getElementById('loading').remove(), 600);
  animate();
}
start();
