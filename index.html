<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>潘俊侪 · 海报素材集</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE (Apple Design System)
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --blue:#0066cc;--blue-on-dark:#2997ff;
  --ink:#1d1d1f;--white:#fff;--muted:#86868b;
  --r-pill:9999px;--r-lg:18px;
}
body{
  font-family:var(--font);background:#000;color:var(--white);
  overflow:hidden;height:100vh;width:100vw;
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
}

/* ============================================================
   THREE.JS CANVAS — full screen
   ============================================================ */
#gallery{position:fixed;inset:0;z-index:1}
#gallery canvas{display:block}

/* ============================================================
   OVERLAY UI — floats above Three.js
   ============================================================ */
.overlay{position:fixed;inset:0;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:24px 28px}

/* ---- Top bar ---- */
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;pointer-events:auto}
.brand{font-size:21px;font-weight:600;letter-spacing:0.231px;color:var(--white);
  text-shadow:0 0 20px rgba(0,0,0,.5)}
.top-actions{display:flex;gap:8px}

/* ---- Filter chips ---- */
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;pointer-events:auto}
.filter-chip{
  font-family:var(--font);font-size:13px;font-weight:400;letter-spacing:-0.12px;
  color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);border-radius:var(--r-pill);
  padding:7px 16px;cursor:pointer;backdrop-filter:blur(10px);
  transition:all .25s;
}
.filter-chip:hover{background:rgba(255,255,255,.15);color:#fff}
.filter-chip.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* ---- Bottom info ---- */
.bottom-bar{display:flex;justify-content:space-between;align-items:flex-end;pointer-events:auto}
.creator-info{display:flex;align-items:center;gap:12px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(20px);
  border-radius:var(--r-pill);padding:8px 18px 8px 8px;
  border:1px solid rgba(255,255,255,.08)}
.creator-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden}
.creator-avatar img{width:100%;height:100%;object-fit:cover}
.creator-name{font-size:14px;font-weight:500;color:var(--white);letter-spacing:-0.12px}
.creator-label{font-size:11px;color:var(--muted);letter-spacing:-0.08px}

.hint-text{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:-0.08px;text-align:right}

/* ---- Hover tooltip ---- */
.tooltip{
  position:fixed;pointer-events:none;z-index:20;
  font-family:var(--mono);font-size:12px;color:var(--white);
  background:rgba(0,0,0,.75);backdrop-filter:blur(10px);
  border-radius:8px;padding:8px 14px;
  opacity:0;transform:translate(-50%,-120%);
  transition:opacity .15s;
}
.tooltip.show{opacity:1}

/* ---- Lightbox ---- */
.lightbox{position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s}
.lightbox.open{opacity:1;pointer-events:auto}
.lightbox img{max-width:88vw;max-height:88vh;border-radius:var(--r-lg);
  box-shadow:rgba(0,0,0,.3) 0 20px 60px;transform:scale(.92);transition:transform .4s}
.lightbox.open img{transform:scale(1)}
.lb-close{position:absolute;top:24px;right:24px;
  width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);
  border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:background .2s}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%)}
.lb-nav.l{left:20px}.lb-nav.r{right:20px}
.lb-info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:14px;color:var(--muted)}

/* ---- Loading ---- */
.loading{position:fixed;inset:0;z-index:50;display:flex;
  align-items:center;justify-content:center;background:#000;
  transition:opacity .5s;pointer-events:none}
.loading.done{opacity:0}
.loading span{font-family:var(--mono);font-size:13px;color:var(--muted);
  letter-spacing:0.5em;text-transform:uppercase}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:640px){
  .overlay{padding:16px}
  .brand{font-size:16px}
  .filter-chip{font-size:11px;padding:5px 12px}
  .creator-info{padding:6px 14px 6px 6px}
  .creator-avatar{width:28px;height:28px}
  .creator-name{font-size:12px}
  .hint-text{display:none}
}
</style>
</head>
<body>

<div class="loading" id="loading"><span>Loading</span></div>

<div id="gallery"></div>

<div class="overlay">
  <div class="top-bar">
    <span class="brand">海报素材集</span>
    <div class="top-actions">
    </div>
  </div>

  <div class="filter-chips" id="filters">
    <button class="filter-chip active" data-filter="all">全部</button>
    <button class="filter-chip" data-filter="a">系列 A</button>
    <button class="filter-chip" data-filter="b">系列 B</button>
    <button class="filter-chip" data-filter="c">系列 C</button>
    <button class="filter-chip" data-filter="d">系列 D</button>
  </div>

  <div class="bottom-bar">
    <div class="creator-info" onclick="document.getElementById('lightbox').classList.add('open');document.getElementById('lbImg').src='网站制作者.jpg';document.getElementById('lbInfo').textContent='潘俊侪 · Collection Curator';document.body.style.overflow='hidden'">
      <div class="creator-avatar"><img src="网站制作者.jpg" alt="潘俊侪"></div>
      <div>
        <div class="creator-name">潘俊侪</div>
        <div class="creator-label">Collection Curator</div>
      </div>
    </div>
    <span class="hint-text">拖拽平移 · 滚轮缩放 · 点击查看</span>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-nav l btn-circular" id="lbPrev">‹</button>
  <button class="lb-nav r btn-circular" id="lbNext">›</button>
  <img src="" alt="" id="lbImg">
  <span class="lb-info" id="lbInfo"></span>
</div>

<script type="importmap">
{ "imports": { "three": "https://esm.sh/three@0.184.0" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ================================================================
   POSTER DATA — 32 posters, 8 per category
   ================================================================ */
const TOTAL = 32;
const posters = [];
const cats = ['a','b','c','d'];
for (let i = 1; i <= TOTAL; i++) {
  posters.push({
    id: i, image: `${i}.jpg`, category: cats[Math.floor((i-1)/8)],
    label: `海报 ${String(i).padStart(2,'0')}`,
  });
}

let activeFilter = 'all';
let visiblePosters = posters.slice();

/* ================================================================
   THREE.JS SETUP
   ================================================================ */
const container = document.getElementById('gallery');
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
container.appendChild(renderer.domElement);

/* ================================================================
   SHADERS — adapted from ti-phantom-gallery
   ================================================================ */
const vertexShader = /* glsl */`
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fragmentShader = /* glsl */`
  uniform vec2 uOffset;
  uniform vec2 uResolution;
  uniform vec2 uMousePos;
  uniform float uZoom;
  uniform float uCellSize;
  uniform float uTextureCount;
  uniform float uAtlasSize;
  uniform sampler2D uImageAtlas;
  varying vec2 vUv;

  void main() {
    vec2 screenUV = (vUv - 0.5) * 2.0;
    float radius = length(screenUV);
    float distortion = 1.0 - 0.08 * radius * radius;
    vec2 distortedUV = screenUV * distortion;
    vec2 aspectRatio = vec2(uResolution.x / uResolution.y, 1.0);
    vec2 worldCoord = distortedUV * aspectRatio * uZoom + uOffset;

    vec2 cellPos = worldCoord / uCellSize;
    vec2 cellId = floor(cellPos);
    vec2 cellUV = fract(cellPos);

    /* Mouse hover cell detection */
    vec2 mouseScreenUV = (uMousePos / uResolution) * 2.0 - 1.0;
    mouseScreenUV.y = -mouseScreenUV.y;
    float mouseRadius = length(mouseScreenUV);
    float mouseDistortion = 1.0 - 0.08 * mouseRadius * mouseRadius;
    vec2 mouseWorld = mouseScreenUV * mouseDistortion * aspectRatio * uZoom + uOffset;
    vec2 mouseCellId = floor(mouseWorld / uCellSize);
    float cellDist = length((cellId + 0.5) - (mouseCellId + 0.5));
    float hover = 1.0 - smoothstep(0.4, 0.7, cellDist);
    bool isHovered = hover > 0.0 && uMousePos.x >= 0.0;

    /* Grid lines */
    float lw = 0.004;
    float gx = smoothstep(0.0, lw, cellUV.x) * smoothstep(0.0, lw, 1.0 - cellUV.x);
    float gy = smoothstep(0.0, lw, cellUV.y) * smoothstep(0.0, lw, 1.0 - cellUV.y);
    float gridMask = gx * gy;

    /* Image area inside cell */
    float imgSize = 0.62;
    float imgBorder = (1.0 - imgSize) * 0.5;
    vec2 imgUV = (cellUV - imgBorder) / imgSize;
    float edgeSmooth = 0.008;
    vec2 imgMask = smoothstep(-edgeSmooth, edgeSmooth, imgUV) *
                   smoothstep(-edgeSmooth, edgeSmooth, 1.0 - imgUV);
    float imgAlpha = imgMask.x * imgMask.y;
    bool inImg = imgUV.x >= 0.0 && imgUV.x <= 1.0 && imgUV.y >= 0.0 && imgUV.y <= 1.0;

    /* Texture atlas lookup */
    float texIdx = mod(cellId.x + cellId.y * 3.0, uTextureCount);
    texIdx = texIdx < 0.0 ? uTextureCount + texIdx : texIdx;
    vec2 atlasPos = vec2(mod(texIdx, uAtlasSize), floor(texIdx / uAtlasSize));

    /* Base background */
    vec3 bg = vec3(0.04);
    if (isHovered) bg = mix(bg, vec3(0.12), hover);

    vec3 color = bg;

    if (inImg && imgAlpha > 0.0) {
      vec2 atlasUV = (atlasPos + imgUV) / uAtlasSize;
      atlasUV.y = 1.0 - atlasUV.y;
      vec3 imgColor = texture2D(uImageAtlas, atlasUV).rgb;
      color = mix(color, imgColor, imgAlpha);
    }

    /* Border */
    vec3 border = vec3(0.15);
    color = mix(color, border, (1.0 - gridMask) * 0.3);

    /* Edge fade */
    float fade = 1.0 - smoothstep(1.2, 1.8, radius);
    gl_FragColor = vec4(color * fade, 1.0);
  }
`;

/* ================================================================
   TEXTURE ATLAS — pack all posters into one texture
   ================================================================ */
async function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function createAtlas(images) {
  const count = images.length;
  const atlasSize = Math.ceil(Math.sqrt(count));
  const cellSize = 512;
  const size = atlasSize * cellSize;

  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, size, size);

  for (let i = 0; i < count; i++) {
    const img = images[i];
    const x = (i % atlasSize) * cellSize;
    const y = Math.floor(i / atlasSize) * cellSize;
    // Scale to fit cell with padding
    const pad = 20;
    const dw = cellSize - pad * 2;
    const dh = cellSize - pad * 2;
    const scale = Math.min(dw / img.width, dh / img.height);
    const iw = img.width * scale;
    const ih = img.height * scale;
    ctx.drawImage(img, x + (cellSize - iw) / 2, y + (cellSize - ih) / 2, iw, ih);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = texture.wrapT = THREE.ClampToEdgeWrapping;
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.flipY = false;
  return { texture, atlasSize, cellSize };
}

/* ================================================================
   BUILD SHADER MATERIAL & PLANE
   ================================================================ */
let plane, uniforms;

async function initGallery(imageList) {
  // Remove old plane
  if (plane) { scene.remove(plane); if (plane.geometry) plane.geometry.dispose(); if (plane.material) plane.material.dispose(); }

  const count = imageList.length;
  const images = await Promise.all(imageList.map(p => loadImage(p.image)));
  const atlas = await createAtlas(images);

  uniforms = {
    uOffset: { value: new THREE.Vector2(0, 0) },
    uResolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) },
    uMousePos: { value: new THREE.Vector2(-1, -1) },
    uZoom: { value: 1.0 },
    uCellSize: { value: 0.75 },
    uTextureCount: { value: count },
    uAtlasSize: { value: atlas.atlasSize },
    uImageAtlas: { value: atlas.texture },
  };

  const geometry = new THREE.PlaneGeometry(2, 2);
  const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
  plane = new THREE.Mesh(geometry, material);
  scene.add(plane);
}

/* ================================================================
   INTERACTION STATE
   ================================================================ */
let offset = { x: 0, y: 0 }, targetOffset = { x: 0, y: 0 };
let zoom = 1.0, targetZoom = 1.0;
let mousePos = { x: -1, y: -1 };
let isDragging = false, isClick = true, clickTime = 0;
let prevMouse = { x: 0, y: 0 };
const LERP = 0.075;

/* ================================================================
   RESIZE
   ================================================================ */
function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h);
  if (uniforms) uniforms.uResolution.value.set(w, h);
}
window.addEventListener('resize', resize);

/* ================================================================
   MOUSE / TOUCH / WHEEL
   ================================================================ */
const el = renderer.domElement;

el.addEventListener('mousemove', e => {
  const rect = el.getBoundingClientRect();
  mousePos.x = e.clientX - rect.left;
  mousePos.y = e.clientY - rect.top;
  if (uniforms) uniforms.uMousePos.value.set(mousePos.x, mousePos.y);

  if (isDragging) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
      isClick = false;
      if (targetZoom === 1.0) targetZoom = 1.25;
    }
    targetOffset.x -= dx * 0.003;
    targetOffset.y += dy * 0.003;
    prevMouse.x = e.clientX;
    prevMouse.y = e.clientY;
  }

  updateTooltip();
});

el.addEventListener('mouseleave', () => {
  mousePos.x = mousePos.y = -1;
  if (uniforms) uniforms.uMousePos.value.set(-1, -1);
  hideTooltip();
});

el.addEventListener('mousedown', e => {
  isDragging = true; isClick = true; clickTime = Date.now();
  prevMouse.x = e.clientX; prevMouse.y = e.clientY;
});

window.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  targetZoom = 1.0;
  if (isClick && Date.now() - clickTime < 200) handleClick(e);
});

el.addEventListener('wheel', e => {
  e.preventDefault();
  targetZoom = Math.max(0.5, Math.min(3, targetZoom - e.deltaY * 0.001));
}, { passive: false });

/* Touch */
el.addEventListener('touchstart', e => {
  e.preventDefault();
  isDragging = true; isClick = true; clickTime = Date.now();
  prevMouse.x = e.touches[0].clientX;
  prevMouse.y = e.touches[0].clientY;
}, { passive: false });

el.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) { isClick = false; if (targetZoom === 1.0) targetZoom = 1.25; }
  targetOffset.x -= dx * 0.003;
  targetOffset.y += dy * 0.003;
  prevMouse.x = e.touches[0].clientX;
  prevMouse.y = e.touches[0].clientY;
}, { passive: false });

el.addEventListener('touchend', e => {
  if (!isDragging) return;
  isDragging = false; targetZoom = 1.0;
  if (isClick && Date.now() - clickTime < 200) {
    const t = e.changedTouches[0];
    handleClick({ clientX: t.clientX, clientY: t.clientY });
  }
});

/* ================================================================
   CLICK → LIGHTBOX
   ================================================================ */
function handleClick(e) {
  const rect = el.getBoundingClientRect();
  const sx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const sy = -(((e.clientY - rect.top) / rect.height) * 2 - 1);
  const radius = Math.sqrt(sx * sx + sy * sy);
  const distortion = 1.0 - 0.08 * radius * radius;
  const aspect = container.clientWidth / container.clientHeight;

  let wx = sx * distortion * aspect * zoom + offset.x;
  let wy = sy * distortion * zoom + offset.y;

  const cellX = Math.floor(wx / 0.75);
  const cellY = Math.floor(wy / 0.75);
  let idx = Math.floor((cellX + cellY * 3) % visiblePosters.length);
  if (idx < 0) idx = visiblePosters.length + idx;

  const poster = visiblePosters[idx];
  if (poster) openLightbox(poster.id);
}

/* ================================================================
   TOOLTIP
   ================================================================ */
const tooltip = document.getElementById('tooltip');
let tooltipPoster = null;

function updateTooltip() {
  if (isDragging) { hideTooltip(); return; }
  const rect = el.getBoundingClientRect();
  const sx = ((mousePos.x) / rect.width) * 2 - 1;
  const sy = -((mousePos.y) / rect.height) * 2 + 1;
  const radius = Math.sqrt(sx * sx + sy * sy);
  const distortion = 1.0 - 0.08 * radius * radius;
  const aspect = container.clientWidth / container.clientHeight;

  let wx = sx * distortion * aspect * zoom + offset.x;
  let wy = sy * distortion * zoom + offset.y;

  const cellX = Math.floor(wx / 0.75);
  const cellY = Math.floor(wy / 0.75);
  let idx = Math.floor((cellX + cellY * 3) % visiblePosters.length);
  if (idx < 0) idx = visiblePosters.length + idx;

  const poster = visiblePosters[idx];
  if (poster && poster !== tooltipPoster) {
    tooltipPoster = poster;
    tooltip.textContent = poster.label;
    tooltip.classList.add('show');
  }
  if (poster) {
    tooltip.style.left = mousePos.x + 'px';
    tooltip.style.top = mousePos.y + 'px';
  }
}
function hideTooltip() {
  tooltipPoster = null;
  tooltip.classList.remove('show');
}

/* ================================================================
   LIGHTBOX
   ================================================================ */
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbInfo = document.getElementById('lbInfo');
let currentLb = 1;

function openLightbox(id) {
  currentLb = id;
  lbImg.src = `${id}.jpg`;
  lbInfo.textContent = `No.${String(id).padStart(2,'0')} / ${TOTAL}`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() { lb.classList.remove('open'); document.body.style.overflow = ''; }
function lbNext() { const list = visiblePosters; const cur = list.findIndex(p => p.id === currentLb); openLightbox(list[(cur + 1) % list.length].id); }
function lbPrev() { const list = visiblePosters; const cur = list.findIndex(p => p.id === currentLb); openLightbox(list[(cur - 1 + list.length) % list.length].id); }

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', lbPrev);
document.getElementById('lbNext').addEventListener('click', lbNext);
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'ArrowLeft') lbPrev();
});

/* ================================================================
   FILTER
   ================================================================ */
document.querySelectorAll('#filters .filter-chip').forEach(chip => {
  chip.addEventListener('click', async () => {
    document.querySelectorAll('#filters .filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;

    visiblePosters = activeFilter === 'all'
      ? posters.slice()
      : posters.filter(p => p.category === activeFilter);

    // Reset view
    offset = { x: 0, y: 0 }; targetOffset = { x: 0, y: 0 };
    zoom = 1.0; targetZoom = 1.0;

    await initGallery(visiblePosters);
  });
});

/* ================================================================
   ANIMATION LOOP
   ================================================================ */
function animate() {
  requestAnimationFrame(animate);

  offset.x += (targetOffset.x - offset.x) * LERP;
  offset.y += (targetOffset.y - offset.y) * LERP;
  zoom += (targetZoom - zoom) * LERP;

  if (plane?.material.uniforms) {
    plane.material.uniforms.uOffset.value.set(offset.x, offset.y);
    plane.material.uniforms.uZoom.value = zoom;
  }

  renderer.render(scene, camera);
}

/* ================================================================
   STARTUP
   ================================================================ */
async function start() {
  visiblePosters = posters.slice();
  await initGallery(visiblePosters);
  resize();
  document.getElementById('loading').classList.add('done');
  setTimeout(() => document.getElementById('loading').remove(), 600);
  animate();
}

start();
</script>
</body>
</html>
